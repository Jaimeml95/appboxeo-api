spring.application.name=api

# ===================================================================
# DATABASE CONFIGURATION (PostgreSQL)
# ===================================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:db_name}
spring.datasource.username=${DB_USER:db_user}
spring.datasource.password=${DB_PASSWORD:db_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
# ddl-auto: 'update' will automatically update the DB schema based on our @Entity classes.
# Ideal for fast development; in production we would use migrations (Flyway/Liquibase) instead.
spring.jpa.hibernate.ddl-auto=update

# Shows the real SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# BEST PRACTICE: disable Open Session In View (OSIV) for professional-grade performance
spring.jpa.open-in-view=false

# ===================================================================
# JWT CONFIGURATION
# ===================================================================
# Base64-encoded secret key (minimum 256 bits). Change it in production.
jwt.secret=${JWT_SECRET}

# ===================================================================
# CORS CONFIGURATION
# ===================================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
# Token expiration in milliseconds (86400000 = 24 hours)
jwt.expiration=86400000

# ===================================================================
# INITIAL ADMIN CONFIGURATION
# ===================================================================
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

# ===================================================================
# GOOGLE SIGN-IN CONFIGURATION
# ===================================================================
# OAuth 2.0 Client ID used to verify the audience claim of Google ID tokens.
google.client-id=${GOOGLE_CLIENT_ID}
