spring.application.name=api

# ===================================================================
# CONFIGURACIï¿½N DE LA BASE DE DATOS (PostgreSQL)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5433/${DB_NAME:nombre_bd}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:contraseï¿½a}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURACIï¿½N DE JPA / HIBERNATE
# ===================================================================
# ddl-auto: 'update' modificarï¿½ la BD automï¿½ticamente segï¿½n nuestras @Entity.
# Es ideal para desarrollo rï¿½pido, aunque en producciï¿½n usarï¿½amos migraciones (Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL reales en la consola de IntelliJ (imprescindible para debugear)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# BUENA PRï¿½CTICA: Desactivar Open Session In View (OSIV) para rendimiento profesional
spring.jpa.open-in-view=false

