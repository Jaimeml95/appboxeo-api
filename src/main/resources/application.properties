spring.application.name=api

# ===================================================================
# CONFIGURACIÓN DE LA BASE DE DATOS (PostgreSQL)
# ===================================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:nombre_bd}
spring.datasource.username=${DB_USER:usuario_bd}
spring.datasource.password=${DB_PASSWORD:contraseña_bd}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===================================================================
# ddl-auto: 'update' modificará la BD automáticamente según nuestras @Entity.
# Es ideal para desarrollo rápido, aunque en producción usaríamos migraciones (Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL reales en la consola de IntelliJ (imprescindible para debugear)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# BUENA PRÁCTICA: Desactivar Open Session In View (OSIV) para rendimiento profesional
spring.jpa.open-in-view=false

# ===================================================================
# CONFIGURACIÓN JWT
# ===================================================================
# Clave secreta en Base64 (mínimo 256 bits). Cámbiala en producción.
jwt.secret=${JWT_SECRET}

# ===================================================================
# CONFIGURACIÓN CORS
# ===================================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
# Expiración del token en milisegundos (86400000 = 24 horas)
jwt.expiration=86400000

# ===================================================================
# CONFIGURACIÓN ADMIN INICIAL
# ===================================================================
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}
